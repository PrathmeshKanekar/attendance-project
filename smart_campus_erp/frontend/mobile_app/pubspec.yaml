name: smart_campus_app
description: Smart Campus Geo Attendance ERP System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Face
  camera: ^0.11.0+1
  google_mlkit_face_detection: ^0.11.0
  image: ^4.1.3

  # Location
  geolocator: ^14.0.2
  permission_handler: ^11.3.1
  location: ^6.0.0

  # Device info
  device_info_plus: ^10.1.0
  flutter_jailbreak_detection: ^1.10.0

  # UI & Charts
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  uuid: ^4.4.0
  sensors_plus: ^7.0.0
  flutter_compass: ^0.8.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  pdf: ^3.12.0
  excel: ^4.0.6
  share_plus: ^12.0.2
  flutter_unity_widget: ^2022.2.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
